<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Thông số cảm biến</title>
  <script src="https://code.highcharts.com/highcharts.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #eef9f8;
      margin: 0;
      padding: 0;
    }
    .header {
      background-color: #4eb9b7;
      color: white;
      text-align: center;
      padding: 1rem;
      font-size: 2rem;
      font-weight: bold;
    }
    #status {
      text-align: center;
      color: red;
      font-weight: bold;
      padding: 0.5rem;
    }
    .chart-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
    }
    .chart-box {
      background: white;
      border-radius: 1rem;
      padding: 1rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 800px;
    }
  </style>
</head>
<body>
  <div class="header">Thông số cảm biến</div>
  <div id="status"></div>
  <div class="chart-container">
    <div id="voltageChart" class="chart-box"></div>
    <div id="currentChart" class="chart-box"></div>
    <div id="powerChart" class="chart-box"></div>
    <div id="frequencyChart" class="chart-box"></div>
    <div id="tempChart" class="chart-box"></div>
  </div>

  <script>
    const MAX_POINTS = 20;
    const charts = {};
    let fetchInterval = null;
    let isOnline = true;

    const chartOptions = (title, unit) => ({
      chart: {
        type: 'spline',
        animation: Highcharts.svg,
        marginRight: 10
      },
      time: {
        useUTC: false
      },
      title: { text: title },
      xAxis: {
        type: 'datetime',
        tickInterval: 30000,
        labels: {
          format: '{value:%I:%M:%S %p}'
        },
        tickPixelInterval: 150
      },
      yAxis: {
        title: { text: unit },
        plotLines: [{
          value: 0,
          width: 1,
          color: '#808080'
        }]
      },
      tooltip: {
        formatter: function () {
          return `<b>${this.series.name}</b><br/>` +
                 Highcharts.dateFormat('%I:%M:%S %p', this.x) +
                 `<br/>Giá trị: ${Highcharts.numberFormat(this.y, 2)} ${unit}`;
        }
      },
      legend: { enabled: true },
      exporting: { enabled: false },
      series: [{
        name: title,
        data: [],
        color: {
          'Voltage': '#f94144',
          'Current': '#f3722c',
          'Power': '#f9c74f',
          'Frequency': '#43aa8b',
          'Temperature': '#577590'
        }[title] || undefined
      }]
    });

    charts.voltage = Highcharts.chart('voltageChart', chartOptions('Voltage', 'V'));
    charts.current = Highcharts.chart('currentChart', chartOptions('Current', 'A'));
    charts.power = Highcharts.chart('powerChart', chartOptions('Power', 'W'));
    charts.frequency = Highcharts.chart('frequencyChart', chartOptions('Frequency', 'Hz'));
    charts.temp = Highcharts.chart('tempChart', chartOptions('Temperature', '°C'));

    const localKey = 'sensor_data_cache';

    function loadLocalData() {
      const raw = localStorage.getItem(localKey);
      if (!raw) return;
      const data = JSON.parse(raw);
      for (const key in data) {
        if (charts[key]) {
          charts[key].series[0].setData(data[key]);
        }
      }
    }

    function saveLocalData() {
      const data = {};
      for (const key in charts) {
        data[key] = charts[key].series[0].data.map(p => [p.x, p.y]);
      }
      localStorage.setItem(localKey, JSON.stringify(data));
    }

    async function fetchSensorData() {
      try {
        const res = await fetch('/api/sensor');
        if (!res.ok) throw new Error('Network response not ok');
        const d = await res.json();
        const now = new Date().getTime();

        if (!isNaN(d.voltage)) charts.voltage.series[0].addPoint([now, d.voltage], true, charts.voltage.series[0].data.length >= MAX_POINTS);
        if (!isNaN(d.current)) charts.current.series[0].addPoint([now, d.current], true, charts.current.series[0].data.length >= MAX_POINTS);
        if (!isNaN(d.power)) charts.power.series[0].addPoint([now, d.power], true, charts.power.series[0].data.length >= MAX_POINTS);
        if (!isNaN(d.frequency)) charts.frequency.series[0].addPoint([now, d.frequency], true, charts.frequency.series[0].data.length >= MAX_POINTS);
        if (!isNaN(d.temp)) charts.temp.series[0].addPoint([now, d.temp], true, charts.temp.series[0].data.length >= MAX_POINTS);

        saveLocalData();

        if (!isOnline) {
          isOnline = true;
          document.getElementById('status').innerText = '';
          startFetching();
        }

      } catch (e) {
        console.error('ESP32 mất kết nối:', e);
        if (isOnline) {
          isOnline = false;
          clearInterval(fetchInterval);
          fetchInterval = null;
          document.getElementById('status').innerText = 'ESP32 mất kết nối. Đồ thị tạm dừng.';
        }
      }
    }

    function startFetching() {
      if (!fetchInterval) {
        fetchSensorData();
        fetchInterval = setInterval(fetchSensorData, 30000);
      }
    }

    window.addEventListener('beforeunload', saveLocalData);

    loadLocalData();
    startFetching();
  </script>
</body>
</html>
