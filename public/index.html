<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Giám sát cảm biến ESP32</title>

  <!-- Highcharts & FontAwesome -->
  <script src="https://code.highcharts.com/highcharts.js"></script>
  <link rel="stylesheet"
        href="https://use.fontawesome.com/releases/v5.7.2/css/all.css"/>

  <!-- ========== CSS ========== -->
  <style>
    *{box-sizing:border-box}html,body{margin:0;padding:0;width:100%;height:100%;
      font-family:Arial,sans-serif;background:#eef9f8;overflow-x:hidden}
    .header{background:#4eb9b7;color:#fff;text-align:center;padding:1.5rem 1rem;
      font-size:2rem;font-weight:700}
    /* Threshold */
    .threshold-box{background:#fff;border-radius:10px;padding:1rem 2rem;
      max-width:800px;margin:1.5rem auto;text-align:center;box-shadow:0 6px 16px
      rgba(0,0,0,.1);font-weight:700}
    .threshold-box input{width:60px;text-align:center;padding:.3rem;border:1px
      solid #ccc;border-radius:5px;font-size:1rem}
    .threshold-box button{padding:.5rem 1rem;margin-left:1rem;background:#4eb9b7;
      color:#fff;border:none;border-radius:5px;cursor:pointer;font-weight:700}
    .status-message{font-size:1rem;margin-top:1rem;font-weight:700}
    .normal{color:#2e7d32}.warning{color:#c62828}

    /* Dashboard & Charts */
    .dashboard{display:flex;flex-wrap:wrap;gap:2rem;justify-content:space-evenly;
      padding:2rem 1rem;max-width:1600px;margin:0 auto}
    .chart-container{position:relative;background:#fff;border-radius:1rem;
      box-shadow:0 6px 16px rgba(0,0,0,.1);padding:3.5rem 1rem 1rem;width:680px;
      max-width:95vw}
    .chart-box{height:300px;margin-bottom:1rem}
    .sensor-card{position:absolute;top:20px;left:20px;background:#fff;border-radius:12px;
      box-shadow:0 6px 16px rgba(0,0,0,.1);padding:.75rem 1.25rem;font-size:1.3rem;
      font-weight:700;display:inline-flex;align-items:center;z-index:10}

    /* Link */
    .link{text-align:center;margin:2rem auto 3rem;font-size:1rem}
    .link a{display:inline-block;background:#4eb9b7;color:#fff;padding:.5rem 1rem;
      border-radius:5px;text-decoration:none;box-shadow:0 2px 4px rgba(0,0,0,.1)}
    .link small{display:block;margin-top:.4rem;color:#555}

    /* Mobile */
    @media(max-width:768px){
      .header{font-size:1.3rem;padding:1rem}
      .chart-container{width:94%;padding:3.2rem 1rem 1rem;margin-bottom:1.5rem}
      .chart-box{height:260px}
      .sensor-card{font-size:1.1rem;padding:.6rem 1rem;top:12px;left:12px}
      .threshold-box{width:max-content;margin:1.2rem auto 0;font-size:.95rem;
        display:grid;grid-template-columns:max-content 90px max-content;
        column-gap:.5rem;row-gap:.9rem;align-items:center}
      .threshold-box button{grid-column:1/-1;justify-self:center;margin-top:.5rem;
        max-width:240px}
      .threshold-box .status-message{grid-column:1/-1;text-align:center}
    }
  </style>
</head>

<body>
  <div class="header">MÔ HÌNH HỆ THỐNG GIÁM SÁT XE TẢI ĐÔNG LẠNH DÙNG IoT ESP32</div>

  <!-- ========= Threshold UI ========= -->
  <div class="threshold-box">
    <label for="upperThreshold">Ngưỡng trên:</label>
    <input type="number" id="upperThreshold"> °C
    <label for="lowerThreshold">Ngưỡng dưới:</label>
    <input type="number" id="lowerThreshold"> °C
    <button onclick="updateThresholds()">Áp dụng</button>
    <div id="tempStatus" class="status-message">Trạng thái nhiệt độ: --</div>
  </div>

  <!-- ========= Dashboard ========= -->
  <div class="dashboard">
    <!-- nhiệt độ -->
    <div class="chart-container">
      <div class="sensor-card"><i class="fas fa-thermometer-half"
           style="color:#07d3f2;margin-right:8px"></i> Nhiệt độ:
        <span id="temp">--</span><sup>°C</sup></div>
      <div id="tempChart" class="chart-box"></div>
    </div>
    <!-- điện áp -->
    <div class="chart-container">
      <div class="sensor-card"><i class="fas fa-charging-station"
           style="color:#41f947;margin-right:8px"></i> Điện áp:
        <span id="voltage">--</span><sup>V</sup></div>
      <div id="voltageChart" class="chart-box"></div>
    </div>
    <!-- dòng điện -->
    <div class="chart-container">
      <div class="sensor-card"><i class="fas fa-bolt"
           style="color:#f3722c;margin-right:8px"></i> Dòng điện:
        <span id="current">--</span><sup>A</sup></div>
      <div id="currentChart" class="chart-box"></div>
    </div>
    <!-- công suất -->
    <div class="chart-container">
      <div class="sensor-card"><i class="fas fa-lightbulb"
           style="color:#f9c74f;margin-right:8px"></i> Công suất:
        <span id="power">--</span><sup>W</sup></div>
      <div id="powerChart" class="chart-box"></div>
    </div>
    <!-- tần số -->
    <div class="chart-container">
      <div class="sensor-card"><i class="fas fa-broadcast-tower"
           style="color:#43aa8b;margin-right:8px"></i> Tần số:
        <span id="frequency">--</span><sup>Hz</sup></div>
      <div id="frequencyChart" class="chart-box"></div>
    </div>
  </div>

  <!-- link Google Sheet -->
  <div class="link">
    <a href="https://docs.google.com/spreadsheets/d/1LOltQDM5NDcgrc2pjWiZKDCAeHVLvKdxlHJFBjUNWVE/edit?usp=sharing"
       target="_blank">XEM DỮ LIỆU TRÊN GOOGLE SHEET</a>
    <small>(Click vào để xem lại các giá trị đã lưu)</small>
  </div>

  <!-- ========== SCRIPT ========== -->
  <script>
  Highcharts.setOptions({ time:{ useUTC:false } });

  /* ----- Chart palette ----- */
  const COLORS = {Voltage:'#41f947',Current:'#f3722c',Power:'#f9c74f',
                  Frequency:'#43aa8b',Temperature:'#07d3f2'};
  const MAX_POINTS = 50, charts = {}; let lastTs = 0;

  function chartOptions(title, unit){
    return{
      chart:{type:'line',animation:Highcharts.svg,marginRight:10},
      title:{text:title},
      xAxis:{type:'datetime',tickInterval:30e3,labels:{format:'{value:%H:%M:%S}'},
             gridLineWidth:0},
      yAxis:{title:{text:null},gridLineWidth:1,gridLineColor:'#d0d0d0',
             gridLineDashStyle:'Solid',minorTickInterval:null,labels:{rotation:0}},
      tooltip:{formatter(){return `<b>${this.series.name}</b><br/>${
              Highcharts.dateFormat('%H:%M:%S',this.x)}<br/>Giá trị: ${
              Highcharts.numberFormat(this.y,2)} ${unit}`}},
      legend:{enabled:false},exporting:{enabled:false},credits:{enabled:false},
      series:[{name:title,data:[],color:COLORS[title]}]
    };
  }

  /* ----- Init charts ----- */
  charts.temp      = Highcharts.chart('tempChart',      chartOptions('Temperature','°C'));
  charts.voltage   = Highcharts.chart('voltageChart',   chartOptions('Voltage','V'));
  charts.current   = Highcharts.chart('currentChart',   chartOptions('Current','A'));
  charts.power     = Highcharts.chart('powerChart',     chartOptions('Power','W'));
  charts.frequency = Highcharts.chart('frequencyChart', chartOptions('Frequency','Hz'));

  /* ----- Fetch sensor data ----- */
  async function fetchSensorData(){
    try{
      const res = await fetch('/api/sensor',{cache:'no-store'});
      const {history,thresholds} = await res.json();
      // điền ngưỡng 1 lần (nếu input trống)
      if(thresholds){
        if(!document.getElementById('upperThreshold').value)
          document.getElementById('upperThreshold').value = thresholds.tempHigh;
        if(!document.getElementById('lowerThreshold').value)
          document.getElementById('lowerThreshold').value = thresholds.tempLow;
      }
      (history||[]).forEach(updateCharts);
    }catch(e){console.warn('Fetch error:',e);}
  }

  function updateCharts(p){
    const {timestamp:ts,voltage,current,power,frequency,temp} = p;
    if(!ts||ts<=lastTs) return; lastTs = ts;
    const push=(ch,val,id)=>{
      if(isNaN(val)) return;
      const s=ch.series[0]; s.addPoint([ts,val],true,s.data.length>=MAX_POINTS);
      document.getElementById(id).innerText=val.toFixed(2);
    };
    push(charts.temp,temp,'temp');
    push(charts.voltage,voltage,'voltage');
    push(charts.current,current,'current');
    push(charts.power,power,'power');
    push(charts.frequency,frequency,'frequency');
    checkTempStatus();
  }

  /* ----- Temp status ----- */
  function checkTempStatus(){
    const low=parseFloat(document.getElementById('lowerThreshold').value);
    const high=parseFloat(document.getElementById('upperThreshold').value);
    const t=parseFloat(document.getElementById('temp').innerText);
    const el=document.getElementById('tempStatus');
    if(isNaN(t)){el.innerText='Trạng thái nhiệt độ: --';el.className='status-message';return;}
    if((!isNaN(low)&&t<low)||(!isNaN(high)&&t>high)){
      el.innerText='Trạng thái nhiệt độ: CẢNH BÁO';el.className='status-message warning';
    }else{
      el.innerText='Trạng thái nhiệt độ: BÌNH THƯỜNG';el.className='status-message normal';
    }
  }

  /* ----- Update thresholds ----- */
  async function updateThresholds(){
    const tempLow=parseFloat(document.getElementById('lowerThreshold').value);
    const tempHigh=parseFloat(document.getElementById('upperThreshold').value);
    if(isNaN(tempLow)||isNaN(tempHigh)) return alert('Nhập đủ hai ngưỡng!');
    if(tempLow>tempHigh) return alert('Ngưỡng thấp phải ≤ ngưỡng cao!');

    try{
      const res=await fetch('/api/sensor',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({tempLow,tempHigh})
      });
      if(!res.ok) throw new Error(await res.text());
      alert('Đã lưu ngưỡng thành công!');
      checkTempStatus();
    }catch(e){alert('Lưu thất bại: '+e.message);}
  }

  /* ----- start ----- */
  fetchSensorData();
  setInterval(fetchSensorData,30e3);
  </script>
</body>
</html>
