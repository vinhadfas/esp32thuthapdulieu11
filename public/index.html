<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Thông số cảm biến</title>
  <script src="https://code.highcharts.com/highcharts.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #eef9f8;
      margin: 0;
      padding: 0;
    }
    .header {
      background-color: #4eb9b7;
      color: white;
      text-align: center;
      padding: 1rem;
      font-size: 2rem;
      font-weight: bold;
    }
    .status-banner {
      text-align: center;
      padding: 0.5rem;
      font-weight: bold;
      color: white;
      display: none;
    }
    .status-online {
      background-color: #43aa8b;
    }
    .status-offline {
      background-color: #f94144;
    }
    .chart-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      transition: 0.5s ease;
    }
    .chart-container.offline {
      pointer-events: none;
      opacity: 0.4;
      filter: grayscale(100%);
    }
    .chart-box {
      background: white;
      border-radius: 1rem;
      padding: 1rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 800px;
    }
  </style>
</head>
<body>
  <div class="header">Thông số cảm biến</div>
  <div id="status" class="status-banner"></div>
  <div class="chart-container" id="chartContainer">
    <div id="voltageChart" class="chart-box"></div>
    <div id="currentChart" class="chart-box"></div>
    <div id="powerChart" class="chart-box"></div>
    <div id="frequencyChart" class="chart-box"></div>
    <div id="tempChart" class="chart-box"></div>
  </div>

  <script>
    const MAX_POINTS = 20;
    const charts = {};
    let isOnline = true;
    let fetchTimeout = null;
    const localKey = 'sensor_data_cache';
    const syncKey = 'latest_sensor_data';
    const TIME_OFFSET = 7 * 60 * 60 * 1000; // UTC+7

    const chartOptions = (title, unit) => ({
      chart: {
        type: 'spline',
        animation: Highcharts.svg,
        marginRight: 10
      },
      time: { useUTC: true },
      title: { text: title },
      xAxis: {
        type: 'datetime',
        tickInterval: 60000,
        labels: {
          formatter: function () {
            return Highcharts.dateFormat('%H:%M:%S', this.value + TIME_OFFSET);
          }
        },
        tickPixelInterval: 150
      },
      yAxis: {
        title: { text: unit },
        plotLines: [{ value: 0, width: 1, color: '#808080' }]
      },
      tooltip: {
        formatter: function () {
          const vnTime = this.x + TIME_OFFSET;
          return `<b>${this.series.name}</b><br/>` +
                 Highcharts.dateFormat('%H:%M:%S', vnTime) +
                 `<br/>Giá trị: ${Highcharts.numberFormat(this.y, 2)} ${unit}`;
        }
      },
      legend: { enabled: true },
      exporting: { enabled: false },
      series: [{
        name: title,
        data: [],
        color: {
          'Voltage': '#f94144',
          'Current': '#f3722c',
          'Power': '#f9c74f',
          'Frequency': '#43aa8b',
          'Temperature': '#577590'
        }[title] || undefined
      }]
    });

    charts.voltage = Highcharts.chart('voltageChart', chartOptions('Voltage', 'V'));
    charts.current = Highcharts.chart('currentChart', chartOptions('Current', 'A'));
    charts.power = Highcharts.chart('powerChart', chartOptions('Power', 'W'));
    charts.frequency = Highcharts.chart('frequencyChart', chartOptions('Frequency', 'Hz'));
    charts.temp = Highcharts.chart('tempChart', chartOptions('Temperature', '°C'));

    function showStatus(online) {
      const container = document.getElementById('chartContainer');
      const status = document.getElementById('status');
      status.style.display = 'block';

      if (online) {
        container.classList.remove('offline');
        status.className = 'status-banner status-online';
        status.textContent = 'ESP32 đã kết nối lại. Đang cập nhật dữ liệu...';
        setTimeout(() => status.style.display = 'none', 3000);
      } else {
        container.classList.add('offline');
        status.className = 'status-banner status-offline';
        status.textContent = 'Mất kết nối ESP32. Đồ thị đã tạm dừng!';
      }
    }

    function loadLocalData() {
      const raw = localStorage.getItem(localKey);
      if (!raw) return;
      const data = JSON.parse(raw);
      for (const key in data) {
        if (charts[key]) {
          charts[key].series[0].setData(data[key]);
        }
      }
    }

    function saveLocalData() {
      const data = {};
      for (const key in charts) {
        data[key] = charts[key].series[0].data.map(p => [p.x, p.y]);
      }
      localStorage.setItem(localKey, JSON.stringify(data));
    }

    function updateChartsFromData(payload) {
      if (!isOnline) return;
      const { timestamp, voltage, current, power, frequency, temp } = payload;

      if (!isNaN(voltage)) charts.voltage.series[0].addPoint([timestamp, voltage], true, charts.voltage.series[0].data.length >= MAX_POINTS);
      if (!isNaN(current)) charts.current.series[0].addPoint([timestamp, current], true, charts.current.series[0].data.length >= MAX_POINTS);
      if (!isNaN(power)) charts.power.series[0].addPoint([timestamp, power], true, charts.power.series[0].data.length >= MAX_POINTS);
      if (!isNaN(frequency)) charts.frequency.series[0].addPoint([timestamp, frequency], true, charts.frequency.series[0].data.length >= MAX_POINTS);
      if (!isNaN(temp)) charts.temp.series[0].addPoint([timestamp, temp], true, charts.temp.series[0].data.length >= MAX_POINTS);

      saveLocalData();
    }

    async function fetchSensorData() {
      try {
        const res = await fetch('/api/sensor', { cache: 'no-store' });
        const d = await res.json();
        const now = new Date();

        if (!d.alive) {
          if (isOnline) {
            isOnline = false;
            showStatus(false);
            localStorage.removeItem(syncKey);
          }
          return;
        }

        if (!isOnline) {
          isOnline = true;
          showStatus(true);
        }

        const payload = {
          timestamp: now.getTime(),
          voltage: d.voltage,
          current: d.current,
          power: d.power,
          frequency: d.frequency,
          temp: d.temp
        };

        updateChartsFromData(payload);
        if (isOnline) {
          localStorage.setItem(syncKey, JSON.stringify(payload));
        }
      } catch (e) {
        console.warn('Lỗi khi kết nối tới API: ', e);
        if (isOnline) {
          isOnline = false;
          showStatus(false);
          localStorage.removeItem(syncKey);
        }
      }
    }

    function scheduleNextFetch() {
      if (fetchTimeout) clearTimeout(fetchTimeout);
      const now = new Date();
      const delay = 60000 - (now.getSeconds() * 1000 + now.getMilliseconds());

      fetchTimeout = setTimeout(async () => {
        await fetchSensorData();
        scheduleNextFetch();
      }, delay);
    }

    window.addEventListener('storage', (event) => {
      if (event.key === syncKey && event.newValue && isOnline) {
        const data = JSON.parse(event.newValue);
        updateChartsFromData(data);
      }
    });

    window.addEventListener('beforeunload', saveLocalData);

    loadLocalData();
    scheduleNextFetch();
  </script>
</body>
</html>
