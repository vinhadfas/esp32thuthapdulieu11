<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thông số cảm biến</title>
  <script src="https://code.highcharts.com/highcharts.js"></script>
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.2/css/all.css" />
  <script>Highcharts.setOptions({ time: { useUTC: false } });</script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #eef9f8;
      margin: 0;
      padding: 0;
    }
    .header {
      background-color: #4eb9b7;
      color: white;
      text-align: center;
      padding: 1rem;
      font-size: 2rem;
      font-weight: bold;
    }
    .chart-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
    }
    .chart-box {
      background: white;
      border-radius: 1rem;
      padding: 1rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 800px;
    }
    .sensor-box {
      margin: 30px auto;
      max-width: 800px;
      padding: 60px;
      background: #fff;
      border-radius: 60px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.1);
    }
    .sensor-item {
      font-size: 1.8rem;
      margin: 20px 0;
    }
    .units {
      font-size: 1rem;
      color: gray;
    }
  </style>
</head>
<body>
  <div class="header">Thông số cảm biến</div>
  <div class="chart-container">
    <div class="sensor-box">
      <div class="sensor-item">
        <i class="fas fa-charging-station" style="color: #41f947;"></i>
        Voltage: <span id="voltage">--</span> <sup class="units">V</sup>
      </div>
      <div class="sensor-item">
        <i class="fas fa-bolt" style="color: #f3722c;"></i>
        Current: <span id="current">--</span> <sup class="units">A</sup>
      </div>
      <div class="sensor-item">
        <i class="fas fa-lightbulb" style="color: #f9c74f;"></i>
        Power: <span id="power">--</span> <sup class="units">W</sup>
      </div>
      <div class="sensor-item">
        <i class="fas fa-broadcast-tower" style="color: #43aa8b;"></i>
        Frequency: <span id="frequency">--</span> <sup class="units">Hz</sup>
      </div>
      <div class="sensor-item">
        <i class="fas fa-thermometer-half" style="color: #07d3f2;"></i>
        Nhiệt độ: <span id="temp">--</span> <sup class="units">°C</sup>
      </div>
    </div>

    <div id="voltageChart" class="chart-box"></div>
    <div id="currentChart" class="chart-box"></div>
    <div id="powerChart" class="chart-box"></div>
    <div id="frequencyChart" class="chart-box"></div>
    <div id="tempChart" class="chart-box"></div>
  </div>

  <script>
    const MAX_POINTS = 50; // bạn có thể tăng/giảm theo lịch sử từ backend
    const charts = {};
    const syncKey = 'latest_sensor_data';
    let lastTimestamp = 0;

    const chartColors = {
      'Voltage': '#41f947',
      'Current': '#f3722c',
      'Power': '#f9c74f',
      'Frequency': '#43aa8b',
      'Temperature': '#07d3f2'
    };

    const chartOptions = (title, unit) => ({
      chart: { type: 'line', animation: Highcharts.svg, marginRight: 10 },
      title: { text: title },
      xAxis: {
        type: 'datetime',
        tickInterval: 30000,
        labels: { format: '{value:%H:%M:%S}' },
        tickPixelInterval: 150
      },
      yAxis: {
        title: { text: unit },
        plotLines: [{ value: 0, width: 1, color: '#808080' }]
      },
      tooltip: {
        formatter: function () {
          return `<b>${this.series.name}</b><br/>` +
                 `${Highcharts.dateFormat('%H:%M:%S', this.x)}<br/>` +
                 `Giá trị: ${Highcharts.numberFormat(this.y, 2)} ${unit}`;
        }
      },
      legend: { enabled: true },
      exporting: { enabled: false },
      series: [{
        name: title,
        data: [],
        color: chartColors[title] || undefined
      }]
    });

    charts.voltage = Highcharts.chart('voltageChart', chartOptions('Voltage', 'V'));
    charts.current = Highcharts.chart('currentChart', chartOptions('Current', 'A'));
    charts.power = Highcharts.chart('powerChart', chartOptions('Power', 'W'));
    charts.frequency = Highcharts.chart('frequencyChart', chartOptions('Frequency', 'Hz'));
    charts.temp = Highcharts.chart('tempChart', chartOptions('Temperature', '°C'));

    function updateChartsFromData(payload) {
      const { timestamp, voltage, current, power, frequency, temp } = payload;

      if (!timestamp || timestamp <= lastTimestamp) return;

      lastTimestamp = timestamp;
      localStorage.setItem(syncKey, JSON.stringify(payload));

      if (!isNaN(voltage)) {
        charts.voltage.series[0].addPoint([timestamp, voltage], true, charts.voltage.series[0].data.length >= MAX_POINTS);
        document.getElementById('voltage').innerText = voltage.toFixed(2);
      }
      if (!isNaN(current)) {
        charts.current.series[0].addPoint([timestamp, current], true, charts.current.series[0].data.length >= MAX_POINTS);
        document.getElementById('current').innerText = current.toFixed(2);
      }
      if (!isNaN(power)) {
        charts.power.series[0].addPoint([timestamp, power], true, charts.power.series[0].data.length >= MAX_POINTS);
        document.getElementById('power').innerText = power.toFixed(2);
      }
      if (!isNaN(frequency)) {
        charts.frequency.series[0].addPoint([timestamp, frequency], true, charts.frequency.series[0].data.length >= MAX_POINTS);
        document.getElementById('frequency').innerText = frequency.toFixed(2);
      }
      if (!isNaN(temp)) {
        charts.temp.series[0].addPoint([timestamp, temp], true, charts.temp.series[0].data.length >= MAX_POINTS);
        document.getElementById('temp').innerText = temp.toFixed(2);
      }
    }

    async function fetchSensorData() {
      try {
        const res = await fetch('/api/sensor', { cache: 'no-store' });
        const d = await res.json();
        const list = d.history || [];

        list.forEach(payload => {
          if (payload.timestamp > lastTimestamp) {
            updateChartsFromData(payload);
          }
        });
      } catch (e) {
        console.warn('Lỗi khi kết nối tới API: ', e);
      }
    }

    // Realtime từ các tab khác
    window.addEventListener('storage', (event) => {
      if (event.key === syncKey && event.newValue) {
        const data = JSON.parse(event.newValue);
        updateChartsFromData(data);
      }
    });

    fetchSensorData();
    setInterval(fetchSensorData, 30000);
  </script>
</body>
</html>
